services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      AGENTSHIELD_REDIS_URL: redis://redis:6379
      AGENTSHIELD_HOST: 0.0.0.0
      AGENTSHIELD_PORT: "8000"
      AGENTSHIELD_LOG_LEVEL: INFO
      AGENTSHIELD_CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure