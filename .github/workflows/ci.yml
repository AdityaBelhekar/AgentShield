name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - name: Ruff check
        run: ruff check agentshield/
      - name: Black format check
        run: black --check agentshield/

  typecheck:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mypy strict type-check
        run: mypy agentshield/ --strict

  test:
    runs-on: ubuntu-latest
    needs: [lint]

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,redis,otel]"
      - name: Smoke test
        run: |
          python - <<'PY'
          from agentshield import shield, __version__
          from agentshield.config import AgentShieldConfig
          from agentshield.exceptions import PolicyViolationError
          from agentshield.events.models import EventType, SeverityLevel
          from agentshield.policy.models import BUILTIN_POLICIES

          assert __version__ == "0.1.0"
          assert "no_exfiltration" in BUILTIN_POLICIES
          assert "strict" in BUILTIN_POLICIES
          assert "monitor_only" in BUILTIN_POLICIES
          print("Smoke test passed.")
          PY
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: .coverage
          if-no-files-found: ignore

  build-check:
    runs-on: ubuntu-latest
    needs: [typecheck, test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install hatchling build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Validate package metadata
        run: twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
