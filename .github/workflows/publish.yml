name: Publish

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package for version check
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify tag matches package version
        run: |
          python -c "
          import agentshield, sys
          tag = '${{ github.ref_name }}'
          version = agentshield.__version__
          assert tag == f'v{version}', f'Tag {tag} does not match package version {version}'
          print(f'Version match confirmed: {version}')
          "

      - name: Extract version for release notes
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## AgentShield ${{ github.ref_name }}

            Install via pip:
```bash
            pip install agentshield-x==${{ steps.version.outputs.value }}
```

            Full changelog: [CHANGELOG.md](CHANGELOG.md)
            Docs: https://AdityaBelhekar.github.io/AgentShield
